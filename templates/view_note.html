{% extends "base.html" %}
{% block title %}View Note{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>{{ note.title }}</h2>
    <p class="text-muted">{{ note.category }} | {{ note.created_at.strftime('%d %b %Y, %I:%M %p') }}</p>
    <hr>
    <div>
        {{ note.content }}
    </div>
    <a href="{{ url_for('dashboard') }}" class="btn btn-secondary mt-4">⬅️ वापस</a>
</div>
{% endblock %}
