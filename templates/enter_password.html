{% extends "base.html" %}
{% block title %}Private Note Password{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="alert alert-info">यह नोट प्राइवेट है। कृपया पासवर्ड डालें।</div>
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
            <label for="password" class="form-label">पासवर्ड</label>
            <input type="password" name="password" id="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">Unlock Note</button>
        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
