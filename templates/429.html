<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Too Many Requests</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Modal -->
<div class="modal fade show" id="rateLimitModal" tabindex="-1" aria-labelledby="rateLimitModalLabel" aria-modal="true" role="dialog" style="display: block; background: rgba(0,0,0,0.5);">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="rateLimitModalLabel">⏳ Too Many Requests</h5>
      </div>
      <div class="modal-body">
        <p>You've hit the request limit. Please wait before trying again.</p>
        {% if retry_after %}
          <p>Retry after: <span id="countdown">{{ retry_after }}</span> seconds</p>
        {% else %}
          <p>Please wait a moment before retrying.</p>
        {% endif %}
      </div>
      <div class="modal-footer">
        <a href="{{ url_for('index') }}" class="btn btn-secondary">Go Back Home</a>
        <button id="retryButton" class="btn btn-primary" style="display:none;" onclick="location.reload()">Retry Now</button>
      </div>
    </div>
  </div>
</div>

<script>
  var countdownSeconds = parseInt(document.getElementById('countdown')?.innerText);
  var countdownEl = document.getElementById('countdown');
  var retryBtn = document.getElementById('retryButton');

  if (countdownSeconds && countdownEl) {
    var interval = setInterval(function () {
      countdownSeconds--;
      countdownEl.innerText = countdownSeconds;
      if (countdownSeconds <= 0) {
        clearInterval(interval);
        countdownEl.innerText = "0";
        retryBtn.style.display = "inline-block";
      }
    }, 1000);
  }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Re-initialize modal (optional, but keeps it clean)
  var myModal = new bootstrap.Modal(document.getElementById('rateLimitModal'), {keyboard: false});
  myModal.show();
</script>

</body>
</html>
